<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>SanctumXI</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e8eef7;
      --muted: #8fa3bf;
      --accent: #6eb5ff;
      --border: #2a3a52;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, #101722 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 20, 25, 0.92);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      max-width: min(1600px, 100%);
      margin: 0 auto;
    }

    .header-tools {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-left: auto;
    }

    #search-form {
      display: flex;
      gap: 0.35rem;
      align-items: center;
    }

    #search-form input[type="search"] {
      width: min(220px, 42vw);
      padding: 0.4rem 0.65rem;
      font-size: 0.85rem;
    }

    #search-form button {
      padding: 0.4rem 0.7rem;
      font-size: 0.82rem;
    }

    .auth-area {
      position: relative;
    }

    .profile-button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .profile-button:hover,
    .profile-button[aria-expanded="true"] {
      border-color: var(--accent);
      color: var(--accent);
    }

    .profile-button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile-button svg {
      width: 20px;
      height: 20px;
    }

    .profile-menu {
      position: absolute;
      top: calc(100% + 0.45rem);
      right: 0;
      min-width: 220px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
      padding: 0.35rem;
      z-index: 20;
    }

    .profile-menu[hidden] {
      display: none;
    }

    .profile-menu-header {
      padding: 0.65rem 0.75rem 0.55rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.35rem;
    }

    .profile-menu-name {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text);
    }

    .profile-menu-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .profile-menu-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.55rem 0.75rem;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--text);
      font: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    .profile-menu-item:hover {
      background: rgba(110, 181, 255, 0.08);
      color: var(--accent);
    }

    .profile-menu-item.danger:hover {
      background: rgba(255, 120, 120, 0.08);
      color: #ff9f9f;
    }

    .profile-menu-item.discord {
      color: #aeb7ff;
    }

    .home-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem clamp(1.25rem, 4vw, 2.5rem);
      max-width: 720px;
    }

    .home-panel h2 {
      margin: 0 0 1rem;
      font-size: 1.6rem;
      letter-spacing: 0.03em;
    }

    .home-panel p {
      margin: 0 0 1rem;
      line-height: 1.6;
    }

    .home-panel p:last-child {
      margin-bottom: 0;
    }

    .auth-notice {
      margin-top: 1rem;
      padding: 0.75rem 0.9rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .auth-notice.success {
      border-color: rgba(110, 181, 255, 0.45);
      background: rgba(110, 181, 255, 0.08);
    }

    .auth-notice.error {
      border-color: rgba(255, 120, 120, 0.45);
      background: rgba(255, 120, 120, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    h1 a {
      color: inherit;
      text-decoration: none;
    }

    form {
      display: flex;
      gap: 0.5rem;
    }

    input[type="search"] {
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 1rem;
    }

    button {
      padding: 0.65rem 1rem;
      border-radius: 8px;
      border: 0;
      background: var(--accent);
      color: #081018;
      font-weight: 700;
      cursor: pointer;
    }

    main {
      width: 100%;
      max-width: min(1600px, 100%);
      margin: 0 auto;
      padding: 1.5rem clamp(1rem, 3vw, 1.5rem) 4rem;
    }

    .muted { color: var(--muted); }

    .results, .article-shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      min-width: 0;
    }

    .result-item {
      display: block;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid var(--border);
      color: inherit;
      text-decoration: none;
    }

    .result-item:last-child { border-bottom: 0; }
    .result-item:hover { background: rgba(110, 181, 255, 0.06); }

    .result-title {
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .source-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .source-tag {
      font-size: 0.78rem;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .article-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.15);
      flex-wrap: wrap;
    }

    @media (max-width: 720px) {
      .header-row {
        flex-wrap: wrap;
      }

      .header-tools {
        width: 100%;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      #search-form input[type="search"] {
        width: min(180px, 55vw);
      }

      h1 {
        white-space: normal;
      }

      .article-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .article-actions {
        width: 100%;
      }
    }

    .article-header h2 {
      margin: 0;
      font-size: 1.35rem;
    }

    .article-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .wiki-content.editing {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
      border-radius: 8px;
      min-height: 240px;
    }

    .edit-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1.1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(110, 181, 255, 0.08);
    }

    .source-tabs {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .source-tab {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    .source-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #081018;
    }

    .wiki-content {
      padding: 1.25rem 1.1rem 1.5rem;
      line-height: 1.55;
      color: var(--text);
      overflow-x: auto;
      max-width: 100%;
      min-width: 0;
      -webkit-overflow-scrolling: touch;
    }

    .wiki-content .mw-parser-output {
      min-width: 0;
      max-width: 100%;
    }

    .wiki-content div[style*="display:flex"],
    .wiki-content div[style*="display: flex"] {
      flex-wrap: wrap !important;
      max-width: 100% !important;
    }

    .wiki-content figure {
      max-width: 100%;
    }

    .wiki-content table {
      background: transparent;
      border-collapse: collapse;
    }

    .wiki-content table.wikitable {
      width: 100%;
      max-width: 100%;
    }

    .wiki-content table.wikitable :is(th, td) {
      color: var(--text);
    }

    /* Stack BG Wiki's side-by-side spell columns on narrower viewports */
    .wiki-content table:has(> tbody > tr > td > table.wikitable) {
      width: 100% !important;
      max-width: 100% !important;
    }

    .wiki-content table:has(> tbody > tr > td > table.wikitable) > tbody > tr:has(> td > table.wikitable) {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .wiki-content table:has(> tbody > tr > td > table.wikitable) > tbody > tr:has(> td > table.wikitable) > td {
      display: block;
      width: 100% !important;
      max-width: 100% !important;
    }

    .wiki-content table:has(> tbody > tr > td > table.wikitable) > tbody > tr > td > table {
      width: 100% !important;
      max-width: 100% !important;
    }

    @media (min-width: 1100px) {
      .wiki-content table:has(> tbody > tr > td > table.wikitable) > tbody > tr:has(> td > table.wikitable) {
        flex-direction: row;
        align-items: flex-start;
      }

      .wiki-content table:has(> tbody > tr > td > table.wikitable) > tbody > tr:has(> td > table.wikitable) > td {
        flex: 1 1 0;
        min-width: 0;
      }
    }

    .wiki-content .toc,
    .wiki-content .toctitle {
      background: rgba(15, 20, 25, 0.6);
      border-color: var(--border);
      color: var(--text);
    }

    .wiki-content :is(h1, h2, h3, h4) {
      margin-top: 1.4rem;
      margin-bottom: 0.6rem;
    }

    .wiki-content img {
      max-width: 100%;
      height: auto;
    }

    .wiki-content :is(th, td) {
      border: 1px solid var(--border);
      padding: 0.35rem 0.5rem;
    }

    .wiki-content a {
      color: var(--accent);
    }

    .attribution {
      padding: 0.75rem 1.1rem;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
    }

    .attribution a { color: var(--muted); }

    .loading {
      padding: 2rem 1rem;
      text-align: center;
    }

    .profile-page {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      max-width: 720px;
    }

    .profile-hero {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1.75rem clamp(1.25rem, 4vw, 2rem);
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.12);
    }

    .profile-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile-avatar svg {
      width: 42px;
      height: 42px;
    }

    .profile-hero-text h2 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
    }

    .profile-hero-text .profile-handle {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .profile-hero-text .profile-private-note {
      margin-top: 0.45rem;
      font-size: 0.82rem;
      color: var(--muted);
      font-style: italic;
    }

    .profile-body {
      padding: 1.5rem clamp(1.25rem, 4vw, 2rem) 1.75rem;
    }

    .profile-section {
      margin-bottom: 1.5rem;
    }

    .profile-section:last-child {
      margin-bottom: 0;
    }

    .profile-section h3 {
      margin: 0 0 0.85rem;
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .profile-stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .profile-stat {
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.12);
    }

    .profile-stat-label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .profile-stat-value {
      font-size: 1.05rem;
      font-weight: 700;
    }

    .profile-placeholder-note {
      margin-top: 0.75rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .privacy-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .privacy-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.12);
    }

    .privacy-toggle-label {
      font-size: 0.92rem;
    }

    .privacy-toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .profile-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    @media (max-width: 560px) {
      .profile-hero {
        flex-direction: column;
        align-items: flex-start;
      }

      .profile-stat-grid {
        grid-template-columns: 1fr;
      }
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 100;
    }

    .modal-overlay[hidden] {
      display: none;
    }

    .modal-panel {
      width: min(440px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      padding: 1.5rem;
    }

    .modal-panel h3 {
      margin: 0 0 0.5rem;
      font-size: 1.2rem;
    }

    .modal-panel p {
      margin: 0 0 1rem;
      line-height: 1.5;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }

    .modal-field label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .modal-field input {
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text);
      font-size: 1rem;
    }

    .modal-error {
      margin-bottom: 0.75rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 120, 120, 0.45);
      background: rgba(255, 120, 120, 0.08);
      color: #ff9f9f;
      font-size: 0.88rem;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .modal-actions .btn-secondary {
      padding: 0.55rem 0.9rem;
      font-size: 0.9rem;
    }

    .modal-actions button[type="submit"] {
      padding: 0.55rem 0.9rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <h1><a href="/" id="home-link">SanctumXI</a></h1>
      <div class="header-tools">
        <form id="search-form">
          <input id="search-input" type="search" placeholder="Wiki search..." aria-label="Wiki search" />
          <button type="submit">Search</button>
        </form>
        <div class="auth-area" id="auth-area">
          <button
            class="profile-button"
            id="profile-button"
            type="button"
            aria-label="Account menu"
            aria-expanded="false"
            aria-haspopup="true"
          ></button>
          <div class="profile-menu" id="profile-menu" hidden></div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div id="status" hidden></div>
    <div id="content"></div>
  </main>

  <div id="link-modal" class="modal-overlay" hidden>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="link-modal-title">
      <h3 id="link-modal-title">Link Character</h3>
      <p id="link-modal-description"></p>
      <div id="link-modal-error" class="modal-error" hidden></div>
      <form id="link-modal-form">
        <div class="modal-field" id="link-modal-field"></div>
        <div class="modal-actions">
          <button class="btn-secondary" type="button" id="link-modal-cancel">Cancel</button>
          <button type="submit" id="link-modal-submit">Continue</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const content = document.getElementById('content');
    const status = document.getElementById('status');
    const authArea = document.getElementById('auth-area');
    const profileButton = document.getElementById('profile-button');
    const profileMenu = document.getElementById('profile-menu');
    const form = document.getElementById('search-form');
    const input = document.getElementById('search-input');

    let authState = { loading: true, configured: false, user: null };
    let profileMenuOpen = false;

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const profileIconSvg = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4 20c1.5-4 14.5-4 16 0"></path>
      </svg>
    `;

    function closeProfileMenu() {
      profileMenuOpen = false;
      profileMenu.hidden = true;
      profileButton.setAttribute('aria-expanded', 'false');
    }

    function openProfileMenu() {
      profileMenuOpen = true;
      profileMenu.hidden = false;
      profileButton.setAttribute('aria-expanded', 'true');
    }

    function toggleProfileMenu() {
      if (profileMenuOpen) {
        closeProfileMenu();
      } else {
        openProfileMenu();
      }
    }

    function bindProfileMenuActions() {
      profileMenu.querySelectorAll('[data-action="login"]').forEach((link) => {
        link.addEventListener('click', () => closeProfileMenu());
      });

      const profileBtn = profileMenu.querySelector('[data-action="profile"]');
      if (profileBtn) {
        profileBtn.addEventListener('click', () => {
          closeProfileMenu();
          navigateTo(new URLSearchParams({ view: 'profile' }));
        });
      }

      const logoutBtn = profileMenu.querySelector('[data-action="logout"]');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async () => {
          closeProfileMenu();
          await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
          authState.user = null;
          renderAuthArea();
        });
      }
    }

    function renderProfileMenu() {
      const returnTo = encodeURIComponent(window.location.pathname + window.location.search);

      if (authState.loading) {
        profileMenu.innerHTML = `
          <div class="profile-menu-header">
            <div class="profile-menu-name">Checking account...</div>
          </div>
        `;
        return;
      }

      if (authState.user) {
        profileMenu.innerHTML = `
          <div class="profile-menu-header">
            <div class="profile-menu-name">${escapeHtml(authState.user.globalName)}</div>
            <div class="profile-menu-meta">@${escapeHtml(authState.user.username)}</div>
          </div>
          <button class="profile-menu-item" type="button" data-action="profile">View profile</button>
          <button class="profile-menu-item danger" type="button" data-action="logout">Log out</button>
        `;
        return;
      }

      if (authState.unavailable) {
        profileMenu.innerHTML = `
          <div class="profile-menu-header">
            <div class="profile-menu-name">Sign-in unavailable</div>
            <div class="profile-menu-meta">Could not reach the server auth API</div>
          </div>
        `;
        return;
      }

      if (authState.configured) {
        profileMenu.innerHTML = `
          <div class="profile-menu-header">
            <div class="profile-menu-name">Not signed in</div>
            <div class="profile-menu-meta">Use Discord to sign in</div>
          </div>
          <a class="profile-menu-item discord" data-action="login" href="/auth/discord?returnTo=${returnTo}">Sign in with Discord</a>
        `;
        return;
      }

      profileMenu.innerHTML = `
        <div class="profile-menu-header">
          <div class="profile-menu-name">Accounts unavailable</div>
          <div class="profile-menu-meta">Discord login is not configured</div>
        </div>
      `;
    }

    function renderAuthArea() {
      closeProfileMenu();

      if (authState.user) {
        profileButton.innerHTML = `<img src="${authState.user.avatarUrl}" alt="" />`;
        profileButton.title = authState.user.globalName;
      } else {
        profileButton.innerHTML = profileIconSvg;
        profileButton.title = 'Account';
      }

      renderProfileMenu();
      bindProfileMenuActions();
    }

    profileButton.addEventListener('click', (event) => {
      event.stopPropagation();
      toggleProfileMenu();
    });

    document.addEventListener('click', (event) => {
      if (!authArea.contains(event.target)) {
        closeProfileMenu();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeProfileMenu();
      }
    });

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, {
        credentials: 'same-origin',
        ...options,
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error ?? 'Request failed');
      return data;
    }

    async function loadAuthState() {
      authState = { ...authState, loading: true };
      renderAuthArea();
      try {
        authState = { ...(await fetchJson('/api/auth/me')), loading: false };
      } catch (error) {
        console.error('Auth status check failed:', error);
        authState = { configured: false, user: null, unavailable: true, loading: false };
      }
      renderAuthArea();
    }

    const profileAvatarPlaceholder = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4 20c1.5-4 14.5-4 16 0"></path>
      </svg>
    `;

    function profileAvatarMarkup(avatarUrl) {
      if (avatarUrl) {
        return `<img src="${escapeHtml(avatarUrl)}" alt="" />`;
      }
      return profileAvatarPlaceholder;
    }

    function renderProfileHero(profile) {
      const { discord, game, isOwner } = profile;
      const handle = discord.username
        ? `<div class="profile-handle">@${escapeHtml(discord.username)}</div>`
        : (!isOwner ? '<div class="profile-private-note">Discord username is private</div>' : '');

      return `
        <div class="profile-hero">
          <div class="profile-avatar">${profileAvatarMarkup(discord.avatarUrl)}</div>
          <div class="profile-hero-text">
            <h2>${escapeHtml(game.characterName)}</h2>
            <div class="muted">${escapeHtml(discord.globalName)}</div>
            ${handle}
            ${!discord.avatarUrl && !isOwner ? '<div class="profile-private-note">Discord avatar is private</div>' : ''}
          </div>
        </div>
      `;
    }

    function renderProfileGameStats(profile) {
      const { game } = profile;
      return `
        <div class="profile-section">
          <h3>Character</h3>
          <div class="profile-stat-grid">
            <div class="profile-stat">
              <span class="profile-stat-label">Job &amp; Level</span>
              <span class="profile-stat-value">${escapeHtml(game.job)} / ${escapeHtml(String(game.level))}</span>
            </div>
            <div class="profile-stat">
              <span class="profile-stat-label">Zone</span>
              <span class="profile-stat-value">${escapeHtml(game.zone)}</span>
            </div>
            <div class="profile-stat">
              <span class="profile-stat-label">Nation</span>
              <span class="profile-stat-value">${escapeHtml(game.nation)}</span>
            </div>
            <div class="profile-stat">
              <span class="profile-stat-label">Character</span>
              <span class="profile-stat-value">${escapeHtml(game.characterName)}</span>
            </div>
          </div>
          ${game.linked ? '' : '<p class="profile-placeholder-note">Game data will appear here once your character is linked to the database.</p>'}
        </div>
      `;
    }

    function renderProfileLinkSection(profile) {
      if (!profile.isOwner || profile.game?.linked) {
        return '';
      }

      return `
        <div class="profile-section">
          <h3>Game Account</h3>
          <p class="profile-placeholder-note">Link your FFXI character to load stats on your profile and use account features.</p>
          <div class="profile-actions">
            <button type="button" id="link-character-btn">Link Character</button>
          </div>
        </div>
      `;
    }

    const linkModal = document.getElementById('link-modal');
    const linkModalTitle = document.getElementById('link-modal-title');
    const linkModalDescription = document.getElementById('link-modal-description');
    const linkModalError = document.getElementById('link-modal-error');
    const linkModalForm = document.getElementById('link-modal-form');
    const linkModalField = document.getElementById('link-modal-field');
    const linkModalCancel = document.getElementById('link-modal-cancel');
    const linkModalSubmit = document.getElementById('link-modal-submit');

    let linkModalStep = 'character';

    function setLinkModalError(message = '') {
      if (!message) {
        linkModalError.hidden = true;
        linkModalError.textContent = '';
        return;
      }
      linkModalError.hidden = false;
      linkModalError.textContent = message;
    }

    function closeLinkModal() {
      linkModal.hidden = true;
      linkModalStep = 'character';
      linkModalForm.reset();
      setLinkModalError();
    }

    function openLinkModal() {
      linkModalStep = 'character';
      linkModalTitle.textContent = 'Link Character';
      linkModalDescription.textContent = 'Enter your character name exactly as it appears in game.';
      linkModalSubmit.textContent = 'Continue';
      linkModalField.innerHTML = `
        <label for="link-character-name">Character name</label>
        <input id="link-character-name" name="characterName" type="text" autocomplete="off" required />
      `;
      setLinkModalError();
      linkModal.hidden = false;
      linkModal.querySelector('#link-character-name')?.focus();
    }

    function showLinkExperienceStep(characterName, job) {
      linkModalStep = 'experience';
      linkModalTitle.textContent = 'Verify Ownership';
      linkModalDescription.textContent = `Confirm that ${characterName} is yours by entering the exact experience value for ${job}. Check the Experience menu in game — do not include commas.`;
      linkModalSubmit.textContent = 'Link Account';
      linkModalField.innerHTML = `
        <label for="link-job-exp">${escapeHtml(job)} experience</label>
        <input id="link-job-exp" name="experience" type="number" min="0" step="1" inputmode="numeric" autocomplete="off" required />
      `;
      setLinkModalError();
      linkModal.querySelector('#link-job-exp')?.focus();
    }

    async function handleLinkModalSubmit(event) {
      event.preventDefault();
      setLinkModalError();
      linkModalSubmit.disabled = true;

      try {
        if (linkModalStep === 'character') {
          const characterName = linkModalForm.characterName?.value?.trim();
          if (!characterName) {
            setLinkModalError('Character name is required.');
            return;
          }

          const prompt = await fetchJson('/api/account/link/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ characterName }),
          });

          showLinkExperienceStep(prompt.characterName, prompt.job);
          return;
        }

        const experience = linkModalForm.experience?.value;
        await fetchJson('/api/account/link/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ experience }),
        });

        closeLinkModal();
        const profile = await fetchJson('/api/profile/me');
        renderProfilePageContent(profile);
      } catch (error) {
        setLinkModalError(error.message ?? 'Linking failed.');
      } finally {
        linkModalSubmit.disabled = false;
      }
    }

    linkModalForm.addEventListener('submit', handleLinkModalSubmit);
    linkModalCancel.addEventListener('click', closeLinkModal);
    linkModal.addEventListener('click', (event) => {
      if (event.target === linkModal) {
        closeLinkModal();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && !linkModal.hidden) {
        closeLinkModal();
      }
    });

    function bindProfileLinkButton() {
      const linkBtn = content.querySelector('#link-character-btn');
      if (!linkBtn) return;
      linkBtn.addEventListener('click', openLinkModal);
    }

    function renderProfilePrivacyControls(profile) {
      if (!profile.isOwner || !profile.privacy) {
        return '';
      }

      return `
        <div class="profile-section">
          <h3>Privacy</h3>
          <div class="privacy-list">
            <label class="privacy-toggle">
              <span class="privacy-toggle-label">Show Discord avatar on public profile</span>
              <input type="checkbox" id="privacy-show-avatar" ${profile.privacy.showAvatar ? 'checked' : ''} />
            </label>
            <label class="privacy-toggle">
              <span class="privacy-toggle-label">Show Discord username on public profile</span>
              <input type="checkbox" id="privacy-show-username" ${profile.privacy.showUsername ? 'checked' : ''} />
            </label>
          </div>
          <p class="profile-placeholder-note">When private, other players will not see these fields on your profile.</p>
        </div>
      `;
    }

    function bindProfilePrivacyControls() {
      const avatarToggle = content.querySelector('#privacy-show-avatar');
      const usernameToggle = content.querySelector('#privacy-show-username');
      if (!avatarToggle || !usernameToggle) return;

      async function savePrivacy() {
        try {
          const profile = await fetchJson('/api/profile/me', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              showAvatar: avatarToggle.checked,
              showUsername: usernameToggle.checked,
            }),
          });
          renderProfilePageContent(profile);
        } catch (error) {
          alert(error.message ?? 'Could not save privacy settings.');
        }
      }

      avatarToggle.addEventListener('change', savePrivacy);
      usernameToggle.addEventListener('change', savePrivacy);
    }

    function renderProfilePageContent(profile) {
      status.hidden = false;
      status.className = 'muted';
      status.textContent = profile.isOwner ? 'Your profile' : 'Player profile';
      input.value = '';

      content.innerHTML = `
        <div class="profile-page">
          ${renderProfileHero(profile)}
          <div class="profile-body">
            ${renderProfileGameStats(profile)}
            ${renderProfileLinkSection(profile)}
            ${renderProfilePrivacyControls(profile)}
            ${profile.isOwner ? '' : '<div class="profile-actions"><button class="btn-secondary" type="button" id="profile-back">Back</button></div>'}
          </div>
        </div>
      `;

      bindProfilePrivacyControls();
      bindProfileLinkButton();

      const backBtn = content.querySelector('#profile-back');
      if (backBtn) {
        backBtn.addEventListener('click', () => navigateTo(new URLSearchParams()));
      }
    }

    async function renderProfilePage() {
      const params = new URLSearchParams(window.location.search);
      const targetId = params.get('id');

      if (!targetId && !authState.user) {
        status.hidden = true;
        content.innerHTML = `
          <div class="home-panel">
            <h2>Profile</h2>
            <p>Sign in with Discord to view and manage your profile.</p>
            <a class="profile-menu-item discord" href="/auth/discord?returnTo=${encodeURIComponent('/?view=profile')}">Sign in with Discord</a>
          </div>
        `;
        input.value = '';
        return;
      }

      status.hidden = false;
      status.className = 'muted';
      status.textContent = 'Loading profile...';
      content.innerHTML = '<div class="profile-page"><p class="loading">Loading profile...</p></div>';
      input.value = '';

      try {
        const url = targetId
          ? `/api/profile/${encodeURIComponent(targetId)}`
          : '/api/profile/me';
        const profile = await fetchJson(url);
        renderProfilePageContent(profile);
      } catch (error) {
        status.textContent = 'Profile unavailable';
        content.innerHTML = `
          <div class="home-panel">
            <h2>Profile</h2>
            <p>${escapeHtml(error.message ?? 'That profile could not be loaded.')}</p>
            <div class="profile-actions">
              <button class="btn-secondary" type="button" id="profile-back">Back</button>
            </div>
          </div>
        `;
        content.querySelector('#profile-back')?.addEventListener('click', () => {
          navigateTo(new URLSearchParams());
        });
      }
    }

    function renderHome(authMessage = '') {
      status.hidden = true;
      content.innerHTML = `
        <div class="home-panel">
          <h2>SanctumXI</h2>
          <p>Welcome to the placeholder home page for the SanctumXI private server.</p>
          <p class="muted">More site features are coming soon. Use the wiki search in the top-right to browse retail FFXI reference content, or sign in with Discord when account features are enabled.</p>
          ${authMessage}
        </div>
      `;
      input.value = '';
    }

    function authNoticeFromParams(params) {
      const auth = params.get('auth');
      if (auth === 'success') {
        return '<div class="auth-notice success">Signed in with Discord successfully.</div>';
      }
      if (auth === 'denied') {
        return '<div class="auth-notice error">Discord sign-in was cancelled.</div>';
      }
      if (auth === 'error') {
        return '<div class="auth-notice error">Discord sign-in failed. Check server configuration and try again.</div>';
      }
      return '';
    }

    function clearAuthParams() {
      const params = new URLSearchParams(window.location.search);
      if (!params.has('auth')) return;
      params.delete('auth');
      const next = params.toString();
      history.replaceState(null, '', next ? `/?${next}` : '/');
    }

    function pageParams(title, source) {
      const params = new URLSearchParams({ title });
      if (source) params.set('source', source);
      return params;
    }

    function navigateTo(params, replace = false) {
      const url = `/?${params.toString()}`;
      if (replace) {
        history.replaceState(null, '', url);
      } else {
        history.pushState(null, '', url);
      }
      boot();
    }

    function preferredSource(sources) {
      return sources.find((entry) => entry.source === 'bgwiki')?.source
        ?? sources.find((entry) => entry.source === 'ffxiclopedia')?.source
        ?? sources[0]?.source;
    }

    function sanctumActionButton(page) {
      if (page.source === 'sanctum') {
        return '';
      }

      if (page.canCreateSanctum) {
        return '<button class="btn-secondary" id="sanctum-action" type="button">Create Sanctum Entry</button>';
      }

      if (page.hasSanctumEntry) {
        return '<button class="btn-secondary" id="sanctum-action" type="button">Sanctum</button>';
      }

      return '';
    }

    function renderResults(data) {
      if (!data.results.length) {
        content.innerHTML = '<div class="results"><p class="loading">No pages found.</p></div>';
        return;
      }

      content.innerHTML = `
        <div class="results">
          ${data.results.map((entry) => `
            <a class="result-item" href="/?title=${encodeURIComponent(entry.title)}&source=${encodeURIComponent(preferredSource(entry.sources))}">
              <div class="result-title">${entry.title}</div>
              <div class="source-tags">
                ${entry.sources.map((source) => `<span class="source-tag">${source.sourceName}</span>`).join('')}
              </div>
            </a>
          `).join('')}
        </div>
      `;

      content.querySelectorAll('.result-item').forEach((link) => {
        link.addEventListener('click', (event) => {
          event.preventDefault();
          const params = new URLSearchParams(link.getAttribute('href').slice(2));
          navigateTo(params);
        });
      });
    }

    function renderPage(page, editMode = false) {
      const params = new URLSearchParams(window.location.search);
      const editing = editMode || params.get('edit') === '1';

      const tabs = (page.externalSources ?? [])
        .map((entry) => `
          <button
            class="source-tab ${entry.source === page.source ? 'active' : ''}"
            data-source="${entry.source}"
            type="button"
          >${entry.sourceName}</button>
        `).join('');

      const sanctumButton = sanctumActionButton(page);

      const editButton = page.source === 'sanctum' && page.editable && !editing
        ? '<button class="btn-secondary" id="edit-sanctum" type="button">Edit</button>'
        : '';

      const sanctumIndicator = page.source === 'sanctum'
        ? '<span class="source-tab active" aria-current="page">Sanctum</span>'
        : '';

      const editBar = editing
        ? `<div class="edit-bar">
            <button id="save-sanctum" type="button">Save</button>
            <button class="btn-secondary" id="cancel-edit" type="button">Cancel</button>
          </div>`
        : '';

      content.innerHTML = `
        <div class="article-shell">
          <div class="article-header">
            <h2>${page.title}</h2>
            <div class="article-actions">
              ${sanctumButton}
              ${editButton}
              <div class="source-tabs">${tabs}${sanctumIndicator}</div>
            </div>
          </div>
          ${editBar}
          <div class="wiki-content ${editing ? 'editing' : ''}" ${editing ? 'contenteditable="true"' : ''}>${page.contentHtml}</div>
          <div class="attribution muted">
            ${page.source === 'sanctum'
              ? `Sanctum Wiki${page.clonedFrom ? ` · Cloned from <a href="${page.clonedFrom.url}" target="_blank" rel="noopener noreferrer">BG Wiki</a>` : ''}`
              : `Via <a href="${page.url}" target="_blank" rel="noopener noreferrer">${page.sourceName}</a> · ${page.attribution}`}
          </div>
        </div>
      `;

      content.querySelectorAll('button.source-tab').forEach((tab) => {
        tab.addEventListener('click', () => {
          if (tab.classList.contains('active')) return;
          navigateTo(pageParams(page.title, tab.dataset.source));
        });
      });

      const wikiContent = content.querySelector('.wiki-content');
      if (!editing) {
        wikiContent.addEventListener('click', (event) => {
          const link = event.target.closest('a[href]');
          if (!link) return;

          const href = link.getAttribute('href');
          if (!href || !href.startsWith('/?title=')) return;

          event.preventDefault();
          navigateTo(new URLSearchParams(href.slice(2)));
        });
      }

      const sanctumBtn = content.querySelector('#sanctum-action');
      if (sanctumBtn) {
        sanctumBtn.addEventListener('click', async () => {
          if (page.hasSanctumEntry) {
            navigateTo(pageParams(page.title, 'sanctum'));
            return;
          }

          sanctumBtn.disabled = true;
          sanctumBtn.textContent = 'Creating...';
          try {
            const result = await fetchJson('/api/wiki/sanctum', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ title: page.title }),
            });
            history.replaceState(null, '', `/?title=${encodeURIComponent(result.page.title)}&source=sanctum&edit=1`);
            status.textContent = result.page.title;
            renderPage(result.page, true);
          } catch (error) {
            alert(error.message ?? 'Could not create Sanctum entry.');
            sanctumBtn.disabled = false;
            sanctumBtn.textContent = 'Create Sanctum Entry';
          }
        });
      }

      const editBtn = content.querySelector('#edit-sanctum');
      if (editBtn) {
        editBtn.addEventListener('click', () => {
          history.replaceState(null, '', `/?title=${encodeURIComponent(page.title)}&source=sanctum&edit=1`);
          renderPage(page, true);
        });
      }

      const saveBtn = content.querySelector('#save-sanctum');
      if (saveBtn) {
        saveBtn.addEventListener('click', async () => {
          saveBtn.disabled = true;
          saveBtn.textContent = 'Saving...';
          try {
            const saved = await fetchJson(`/api/wiki/sanctum/${encodeURIComponent(page.slug)}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contentHtml: wikiContent.innerHTML }),
            });
            history.replaceState(null, '', `/?title=${encodeURIComponent(saved.title)}&source=sanctum`);
            status.textContent = saved.title;
            renderPage(saved, false);
          } catch (error) {
            alert(error.message ?? 'Save failed.');
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save';
          }
        });
      }

      const cancelBtn = content.querySelector('#cancel-edit');
      if (cancelBtn) {
        cancelBtn.addEventListener('click', () => {
          history.replaceState(null, '', `/?title=${encodeURIComponent(page.title)}&source=sanctum`);
          boot();
        });
      }
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const q = input.value.trim();
      if (!q) return;
      navigateTo(new URLSearchParams({ q }));
    });

    async function boot() {
      const params = new URLSearchParams(window.location.search);
      const title = params.get('title');
      const source = params.get('source') ?? 'bgwiki';
      const q = params.get('q');

      if (title) {
        status.hidden = false;
        status.className = 'muted';
        status.textContent = 'Loading...';
        content.innerHTML = '<div class="article-shell"><p class="loading">Loading article...</p></div>';
        input.value = title;

        try {
          const page = await fetchJson(`/api/wiki/page?title=${encodeURIComponent(title)}&source=${encodeURIComponent(source)}`);
          status.textContent = page.title;
          renderPage(page);
        } catch {
          status.textContent = 'Page not found.';
          content.innerHTML = '<div class="results"><p class="loading">That page could not be loaded.</p></div>';
        }
        return;
      }

      if (q) {
        status.hidden = false;
        status.className = 'muted';
        status.textContent = 'Searching...';
        content.innerHTML = '<div class="results"><p class="loading">Searching...</p></div>';
        input.value = q;

        try {
          const data = await fetchJson(`/api/wiki/search?q=${encodeURIComponent(q)}`);
          status.textContent = `Results for "${q}"`;
          renderResults(data);
        } catch {
          status.textContent = 'Search failed.';
        }
        return;
      }

      if (params.get('view') === 'profile') {
        if (params.get('auth') === 'success') {
          await loadAuthState();
        }
        await renderProfilePage();
        clearAuthParams();
        return;
      }

      if (params.get('auth') === 'success') {
        await loadAuthState();
      }

      const authMessage = authNoticeFromParams(params);
      renderHome(authMessage);
      clearAuthParams();
    }

    window.addEventListener('popstate', boot);
    loadAuthState().finally(boot);
  </script>
</body>
</html>
